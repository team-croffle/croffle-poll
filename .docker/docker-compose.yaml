services:
  db:
    container_name: croffle-poll-db
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    container_name: croffle-poll-app
    image: ghcr.io/team-croffle/croffle-poll:latest
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD}@${DB_URL:-croffle-poll-db}:5432/${DB_DATABASE:-postgres}
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-admin}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-admin}
    depends_on:
      - db

volumes:
  postgres_data:
